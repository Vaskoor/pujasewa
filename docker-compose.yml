version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pujasewa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pujasewa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-strongpassword}@postgres:5432/pujasewa
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refreshsecret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
