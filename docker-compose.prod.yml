version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pujasewa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
  redis:
    image: redis:7-alpine
    networks:
      - appnet
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/pujasewa
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - appnet
  frontend:
    build: ./frontend
    networks:
      - appnet
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - appnet
volumes:
  pgdata:
networks:
  appnet:
